<div class="bg"></div>

<div class="container">
<h2>📖 The Library That Remembers You</h2>
<input id="nameInput" placeholder="Enter your name and press Enter" />

function showChoiceReveal(current, choice, nextNode, today) {
  // Hide story and choice buttons
  document.getElementById("story").style.display = "none";
  document.getElementById("choices").style.display = "none";
  document.getElementById("recap").style.display = "none";

  // Create a reveal div
  const revealDiv = document.createElement("div");
  revealDiv.id = "choiceReveal";
  revealDiv.style.marginTop = "20px";
  revealDiv.style.border = "1px solid darkred";
  revealDiv.style.padding = "10px";
  revealDiv.style.borderRadius = "10px";

  const choiceText = storyTree[current].choices[choice].text;
  revealDiv.innerHTML = `<h3>Your Choice:</h3><p>${choiceText}</p>`;

  // If next chapter is unlocked, show Continue button
  if(today >= weekReleaseDates[nextNode]){
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Continue the Story →";
    nextBtn.onclick = () => {
      // Proceed to next node
      path.push({from: current, choice});
      localStorage.setItem("path", JSON.stringify(path));
      currentNode = nextNode;
      localStorage.setItem("node", currentNode);
      localStorage.setItem("maxNode", currentNode);

      // Restore main story view
      document.getElementById("story").style.display = "block";
      document.getElementById("choices").style.display = "block";
      document.getElementById("recap").style.display = "block";
      revealDiv.remove();

      render();
    };
    revealDiv.appendChild(nextBtn);
  } else {
    const waitMsg = document.createElement("p");
    waitMsg.textContent = "⏳ The next chapter is not yet available! Come back when it's released.";
    revealDiv.appendChild(waitMsg);
  }

  document.querySelector(".container").appendChild(revealDiv);
}

function showStartOptions() {
  const startDiv = document.createElement("div");
  startDiv.id = "startOptions";
  document.querySelector(".container").insertBefore(startDiv, document.getElementById("welcome"));

  const today = new Date();
  const savedName = localStorage.getItem("username");
  const savedNode = localStorage.getItem("node") || "week1";

  // Start from beginning
  const startBtn = document.createElement("button");
  startBtn.textContent = "Start from the Beginning";
  startBtn.onclick = () => {
    currentNode = "week1";
    path = [];
    localStorage.setItem("node", currentNode);
    localStorage.setItem("path", JSON.stringify(path));
    localStorage.setItem("stats", JSON.stringify({curiosity:0,risk:0,control:0}));
    startDiv.style.display = "none";
    render();
  };
  startDiv.appendChild(startBtn);

  // Resume where left off (if released)
  if (today >= weekReleaseDates[savedNode]) {
    const resumeBtn = document.createElement("button");
    resumeBtn.textContent = "Resume where you left off";
    resumeBtn.onclick = () => {
      currentNode = savedNode;
      startDiv.style.display = "none";
      render();
    };
    startDiv.appendChild(resumeBtn);
  }
}

function playSound(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
}

let stats = JSON.parse(localStorage.getItem("stats")) || {curiosity:0,risk:0,control:0};

function updateStats(choice){
  if(choice === "A") stats.curiosity++;
  if(choice === "B") stats.risk++;
  stats.control = stats.curiosity - stats.risk;
  localStorage.setItem("stats", JSON.stringify(stats));
}

document.getElementById("nameInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    const name = this.value.trim();
    if(!name) return alert("Enter name");
    localStorage.setItem("username", name);
    showStartOptions();
  }
});

function vote(choice) {
  const nextNode = storyTree[currentNode].choices[choice].next;
  const today = new Date();

  // Show the choice reveal screen instead of moving immediately
  showChoiceReveal(currentNode, choice, nextNode, today);
}

function render(){
  const name = localStorage.getItem("username");
  if(!name) return;

  document.getElementById("nameInput").style.display="none";
  document.getElementById("welcome").textContent = `Welcome, ${name}`;

  if(path.length){
    const last = path[path.length-1];
    document.getElementById("recap").textContent = `Previously: ${storyTree[last.from].choices[last.choice].text}`;
  }

  const node = storyTree[currentNode];
  document.getElementById("story").textContent = node.text;

  const div = document.getElementById("choices");
  div.innerHTML="";

  if(node.choices){
    for(let key in node.choices){
        const btn = document.createElement("button");
        btn.textContent = node.choices[key].text;

        // If you have extra narrative for choices, show it first
        btn.onclick = () => {
            if(node.choices[key].extra) {
                alert(node.choices[key].extra); // Show the detailed narrative
            }
            vote(key); // Then proceed to next node
        };

        div.appendChild(btn);
    }
}

  if(!node.choices){
    document.getElementById("summary").innerHTML = `<h3>🎬 Ending Reached</h3><button onclick='location.reload()'>🔄 Replay</button>`;
  }
}

render();
</script>
